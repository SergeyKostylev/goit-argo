services:
  terraform:
    image: hashicorp/terraform:1.7
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ~/.aws:/root/.aws:ro
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
    entrypoint: ["terraform"]

  kubectl:
    image: alpine/k8s:1.32.3
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ~/.kube:/root/.kube:ro
      - ~/.aws:/root/.aws:ro
    entrypoint: ["kubectl"]
